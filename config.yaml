baseURL: https://aicourses.fundyourfreedom.in
languageCode: en-in
title: FundYourFreedom | AI Courses
theme:
  - PaperMod
  - fyf-hugo-theme
timeZone: Asia/Kolkata

defaultContentLanguage: en

pagination:
  pagerSize: 20

params:
  pyodideVersion: "0.27.0"
  mainSections:
    - courses
  homeInfoParams:
    Title: "AI, explained like you actually want to learn it"
    Content: "Intuitive, interactive, step-by-step AI courses. Built for people who want to understand — not just use — AI."
  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  dateFormat: "2 Jan 2006"
  defaultTheme: light
  disableThemeToggle: false
  ShowToc: true
  TocOpen: false

menu:
  main:
    - name: Courses
      url: /courses/
      weight: 5
    - name: News
      url: https://news.fundyourfreedom.in
      weight: 10
    - name: Blog
      url: https://blog.fundyourfreedom.in
      weight: 15
    - name: Learn
      url: https://learn.fundyourfreedom.in
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
